<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — InteractionBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/admin/shared.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <div class="page-header">
          <div>
            <h1>Dashboard</h1>
            <p class="page-header-lead">Monitor de processos, runtime e logs do bot</p>
          </div>
          <div class="pill" id="running-pill">Sem processo em execução</div>
        </div>

        <!-- Processes -->
        <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 14px">
          <article class="card">
            <h2>Processo Ativo</h2>
            <div id="process-running" class="muted">Carregando status…</div>
          </article>
          <article class="card">
            <h2>Histórico de Processos</h2>
            <div id="process-history"></div>
          </article>
        </div>

        <!-- Runtime Steps + Logs -->
        <div class="panel grid" style="grid-template-columns: 0.9fr 1.3fr">
          <article class="card">
            <div class="toolbar">
              <div>
                <h2 style="margin:0">Etapas do Bot</h2>
                <div class="meta">Etapa ativa + histórico recente.</div>
              </div>
            </div>
            <div id="runtime-active-step" class="history-item">
              <span class="muted">Sem etapa ativa.</span>
            </div>
            <div id="runtime-steps" class="runtime-steps"></div>
          </article>

          <article class="card">
            <div class="toolbar">
              <div>
                <h2 style="margin:0">Logs do Bot</h2>
                <div id="runtime-log-meta" class="meta">Carregando feed…</div>
              </div>
              <div class="toolbar-actions">
                <button id="runtime-pause" class="secondary" type="button" style="width:auto;padding:8px 10px">Pausar feed</button>
                <button id="runtime-clear" class="secondary" type="button" style="width:auto;padding:8px 10px">Limpar</button>
              </div>
            </div>
            <div class="runtime-controls" style="margin-top:10px">
              <div class="runtime-filters">
                <input id="runtime-log-filter" type="search" placeholder="Filtrar por texto, escopo ou payload" />
                <select id="runtime-log-level">
                  <option value="all">Todos os níveis</option>
                  <option value="debug">debug</option>
                  <option value="info">info</option>
                  <option value="warn">warn</option>
                  <option value="error">error</option>
                </select>
                <select id="runtime-log-source">
                  <option value="all">Todos os escopos</option>
                </select>
              </div>
            </div>
            <div id="runtime-logs" class="log-feed">
              <div class="muted">Carregando logs…</div>
            </div>
          </article>
        </div>
      </main>
    </div>

    <!-- Admin Prompt Modal -->
    <div id="admin-prompt-overlay" class="modal-overlay" hidden>
      <div class="modal-card">
        <div class="toolbar">
          <div>
            <h2 id="admin-prompt-title">Resposta pendente</h2>
            <div id="admin-prompt-meta" class="meta"></div>
          </div>
          <div class="pill">Aguardando resposta</div>
        </div>
        <p id="admin-prompt-message" class="modal-text"></p>
        <div id="admin-prompt-suggested-wrap" class="stack" hidden>
          <label>Resposta sugerida</label>
          <div id="admin-prompt-suggested" class="modal-answer"></div>
        </div>
        <div id="admin-prompt-select-wrap" class="stack" hidden>
          <label for="admin-prompt-select">Resposta manual</label>
          <select id="admin-prompt-select"></select>
        </div>
        <div id="admin-prompt-text-wrap" class="stack" hidden>
          <label for="admin-prompt-text">Resposta manual</label>
          <textarea id="admin-prompt-text"></textarea>
        </div>
        <p id="admin-prompt-status" class="status"></p>
        <div class="toolbar-actions" style="margin-top:12px">
          <button id="admin-prompt-confirm" type="button">Confirmar GPT</button>
          <button id="admin-prompt-submit" class="secondary" type="button">Enviar resposta</button>
          <button id="admin-prompt-skip" class="secondary" type="button">Pular campo</button>
          <button id="admin-prompt-cancel" class="secondary" type="button">Cancelar</button>
        </div>
      </div>
    </div>

    <script src="/admin/nav.js"></script>
    <script>
      // ── Shared utilities ──
      function escapeHtml(v) {
        return String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      }
      function text(v) { return typeof v === "string" ? v.trim() : ""; }
      function setStatus(el, msg, isErr = false) {
        el.textContent = msg || "";
        el.className = msg ? `status ${isErr ? "danger" : "ok"}` : "status";
      }
      function setHidden(el, hidden) {
        if (!el) return;
        hidden ? el.setAttribute("hidden", "") : el.removeAttribute("hidden");
      }
      function formatDate(v) {
        if (!v) return "-";
        const d = new Date(v);
        return isNaN(d) ? "-" : d.toLocaleString("pt-BR");
      }
      function normalizeText(v) {
        return String(v ?? "").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
      }
      async function request(method, url, payload) {
        const res = await fetch(url, {
          method,
          headers: { "content-type": "application/json" },
          body: payload ? JSON.stringify(payload) : undefined,
        });
        let data = {};
        try { data = await res.json(); } catch {}
        if (!res.ok) throw new Error(data?.error || `Erro HTTP ${res.status}`);
        return data;
      }

      // ── DOM refs ──
      const runningPill = document.getElementById("running-pill");
      const processRunning = document.getElementById("process-running");
      const processHistory = document.getElementById("process-history");
      const runtimeActiveStep = document.getElementById("runtime-active-step");
      const runtimeSteps = document.getElementById("runtime-steps");
      const runtimeLogMeta = document.getElementById("runtime-log-meta");
      const runtimeLogs = document.getElementById("runtime-logs");
      const runtimeLogFilter = document.getElementById("runtime-log-filter");
      const runtimeLogLevel = document.getElementById("runtime-log-level");
      const runtimeLogSource = document.getElementById("runtime-log-source");
      const runtimePauseButton = document.getElementById("runtime-pause");
      const runtimeClearButton = document.getElementById("runtime-clear");
      const adminPromptOverlay = document.getElementById("admin-prompt-overlay");
      const adminPromptTitle = document.getElementById("admin-prompt-title");
      const adminPromptMeta = document.getElementById("admin-prompt-meta");
      const adminPromptMessage = document.getElementById("admin-prompt-message");
      const adminPromptSuggestedWrap = document.getElementById("admin-prompt-suggested-wrap");
      const adminPromptSuggested = document.getElementById("admin-prompt-suggested");
      const adminPromptSelectWrap = document.getElementById("admin-prompt-select-wrap");
      const adminPromptSelect = document.getElementById("admin-prompt-select");
      const adminPromptTextWrap = document.getElementById("admin-prompt-text-wrap");
      const adminPromptText = document.getElementById("admin-prompt-text");
      const adminPromptStatus = document.getElementById("admin-prompt-status");
      const adminPromptConfirm = document.getElementById("admin-prompt-confirm");
      const adminPromptSubmit = document.getElementById("admin-prompt-submit");
      const adminPromptSkip = document.getElementById("admin-prompt-skip");
      const adminPromptCancel = document.getElementById("admin-prompt-cancel");

      // ── State ──
      const runtimeState = { activeStep: null, steps: [], logs: [], isPaused: false, filterText: "", level: "all", source: "all" };
      const adminStreamState = { eventSource: null, reconnectTimer: null, connected: false };
      const adminPromptState = { item: null, isSubmitting: false };
      const adminPromptSettings = { autoConfirmGpt: false, autoConfirmDelayMs: 1000, isSaving: false };

      // ── Process rendering ──
      function renderProcessState(state) {
        const running = state.running;
        if (running) {
          runningPill.textContent = `Executando: ${running.type} (${running.id})`;
          processRunning.innerHTML = `<div class="history-item"><strong>Em execução:</strong> ${escapeHtml(running.type)}<br><span class="meta">iniciado: ${formatDate(running.startedAt)} | id: ${escapeHtml(running.id)}</span><br><span>${escapeHtml(running.summary || "Processo iniciado.")}</span></div>`;
        } else {
          runningPill.textContent = "Sem processo em execução";
          processRunning.innerHTML = `<div class="history-item"><strong>Sem processo em execução</strong><br><span class="meta">O painel está livre para iniciar um novo processo.</span></div>`;
        }
        const history = Array.isArray(state.history) ? state.history : [];
        if (!history.length) { processHistory.innerHTML = "<p class='muted'>Sem histórico ainda.</p>"; return; }
        processHistory.innerHTML = history.slice(0, 6).map((item) => {
          const cls = item.status === "failed" ? "danger" : "ok";
          const err = item.error ? `<div class="danger">${escapeHtml(item.error)}</div>` : "";
          return `<div class="history-item"><strong>${escapeHtml(item.type)}</strong> <span class="${cls}">(${escapeHtml(item.status)})</span><div class="meta">${formatDate(item.startedAt)} → ${formatDate(item.endedAt)}</div><div>${escapeHtml(item.summary || "-")}</div>${err}</div>`;
        }).join("");
      }

      // ── Runtime rendering ──
      function getRuntimeStatusBadge(s) {
        const map = { done:["concluído","badge-ok"], waiting:["aguardando","badge-warn"], pending:["próximo","badge-info"], skipped:["pulado","badge-muted"], error:["erro","badge-danger"] };
        const [label, cls] = map[s] || ["rodando","badge-info"];
        return { label, className: cls };
      }
      function getRuntimeLevelBadge(l) {
        const map = { error:["error","badge-danger"], warn:["warn","badge-warn"], debug:["debug","badge-muted"] };
        const [label, cls] = map[l] || ["info","badge-info"];
        return { label, className: cls };
      }
      function getRuntimeLogSource(entry) {
        const scoped = text(entry && entry.scope);
        if (scoped) return scoped;
        const msg = text(entry && entry.message).toLowerCase();
        if (!msg) return "app";
        if (msg.includes("easy apply") || msg.includes("[easy-apply]")) return "easy-apply";
        if (msg.includes("prompt admin")) return "prompt";
        if (msg.includes("gpt")) return "gpt";
        if (msg.includes("discord")) return "discord";
        if (msg.includes("[network]")) return "network";
        if (msg.includes("[jobs")) return "jobs";
        return "app";
      }
      function buildRuntimeStepHtml(item, isActive = false) {
        if (!item) return `<span class="muted">Sem etapa ativa.</span>`;
        const { label, className } = getRuntimeStatusBadge(item.status);
        const meta = [item.source || "bot", formatDate(item.createdAt)].filter(Boolean).join(" | ");
        return `<div class="step-item ${isActive ? "active" : ""}"><div class="step-item-head"><div class="step-item-title">${escapeHtml(item.label || "Etapa")}</div><span class="badge ${className}">${label}</span></div><div class="meta">${escapeHtml(meta)}</div><div class="step-item-detail">${escapeHtml(item.detail || "Sem detalhe adicional.")}</div></div>`;
      }
      function buildRuntimeLogHtml(item) {
        const { label: lvlLabel, className: lvlCls } = getRuntimeLevelBadge(item.level || "info");
        const source = getRuntimeLogSource(item);
        const dataHtml = item.data ? `<div class="log-item-data">${escapeHtml(item.data)}</div>` : "";
        return `<div class="log-item"><div class="log-item-head"><span class="badge ${lvlCls}">${lvlLabel}</span><span class="pill">${escapeHtml(source)}</span><span class="meta">${escapeHtml(formatDate(item.createdAt))}</span></div><div class="log-item-message">${escapeHtml(item.message || "")}</div>${dataHtml}</div>`;
      }
      function syncRuntimeSourceOptions(logs) {
        const cur = runtimeState.source || "all";
        const sources = Array.from(new Set(["all", ...logs.map(getRuntimeLogSource)]));
        runtimeLogSource.innerHTML = sources.map((s) => `<option value="${escapeHtml(s)}">${escapeHtml(s === "all" ? "Todos os escopos" : s)}</option>`).join("");
        runtimeLogSource.value = sources.includes(cur) ? cur : "all";
        runtimeState.source = runtimeLogSource.value;
      }
      function renderRuntime() {
        runtimePauseButton.textContent = runtimeState.isPaused ? "Retomar feed" : "Pausar feed";
        runtimeActiveStep.innerHTML = buildRuntimeStepHtml(runtimeState.activeStep, true);
        const recentSteps = (runtimeState.steps || []).filter((s) => !runtimeState.activeStep || s.id !== runtimeState.activeStep.id).slice(0, 8);
        runtimeSteps.innerHTML = recentSteps.length ? recentSteps.map((s) => buildRuntimeStepHtml(s)).join("") : `<div class="muted">Sem histórico recente de steps.</div>`;
        const allLogs = runtimeState.logs || [];
        syncRuntimeSourceOptions(allLogs);
        const query = normalizeText(runtimeState.filterText);
        const visible = allLogs.filter((item) => {
          const level = text(item.level) || "info";
          const source = getRuntimeLogSource(item);
          if (runtimeState.level !== "all" && level !== runtimeState.level) return false;
          if (runtimeState.source !== "all" && source !== runtimeState.source) return false;
          if (!query) return true;
          return normalizeText([item.message, item.data, source, level].filter(Boolean).join(" ")).includes(query);
        });
        const streamLabel = adminStreamState.connected ? "SSE ao vivo" : "fallback polling";
        runtimeLogMeta.textContent = `${visible.length}/${allLogs.length} logs | ${runtimeState.isPaused ? "feed pausado" : streamLabel}`;
        runtimeLogs.innerHTML = visible.length ? visible.map(buildRuntimeLogHtml).join("") : `<div class="muted">Nenhum log corresponde aos filtros.</div>`;
      }

      // ── Admin Prompt ──
      function syncBodyModalState() {
        document.body.classList.toggle("modal-open", !adminPromptOverlay.hasAttribute("hidden"));
      }
      function syncAdminPromptButtons() {
        const dis = adminPromptState.isSubmitting || !adminPromptState.item;
        adminPromptConfirm.disabled = dis;
        adminPromptSubmit.disabled = dis;
        adminPromptSkip.disabled = dis;
        adminPromptCancel.disabled = dis;
      }
      function renderPromptSettings(settings) {
        if (!settings) return;
        adminPromptSettings.autoConfirmGpt = Boolean(settings.autoConfirmGpt);
        if (typeof settings.autoConfirmDelayMs === "number") adminPromptSettings.autoConfirmDelayMs = settings.autoConfirmDelayMs;
      }
      function renderAdminPrompt(item) {
        adminPromptState.item = item || null;
        syncAdminPromptButtons();
        if (!item) { setHidden(adminPromptOverlay, true); syncBodyModalState(); setStatus(adminPromptStatus, ""); adminPromptText.value = ""; adminPromptSelect.innerHTML = ""; return; }
        setHidden(adminPromptOverlay, false); syncBodyModalState();
        const isSelect = item.fieldType === "select";
        const isConfirm = item.kind === "confirm-gpt";
        const options = Array.isArray(item.options) ? item.options.filter(Boolean) : [];
        const suggested = item.suggestedAnswer || "";
        adminPromptTitle.textContent = isConfirm ? "Confirmar resposta GPT" : "Responder campo";
        adminPromptMeta.textContent = [`etapa ${item.step}`, item.fieldLabel || item.fieldKey || "campo"].join(" | ");
        adminPromptMessage.textContent = item.prompt || "";
        setStatus(adminPromptStatus, "");
        if (isConfirm && adminPromptSettings.autoConfirmGpt) setStatus(adminPromptStatus, `Modo automático ativo: confirma em ${adminPromptSettings.autoConfirmDelayMs}ms.`);
        setHidden(adminPromptSuggestedWrap, !suggested); adminPromptSuggested.textContent = suggested;
        adminPromptConfirm.textContent = "Confirmar GPT";
        adminPromptSubmit.textContent = isConfirm ? "Usar resposta manual" : "Enviar resposta";
        adminPromptSkip.textContent = isSelect ? "Pular opção" : "Pular campo";
        setHidden(adminPromptConfirm, !isConfirm);
        if (isSelect) {
          adminPromptSelect.innerHTML = "";
          if (!suggested && !isConfirm) { const p = document.createElement("option"); p.value = ""; p.textContent = "Selecione uma opção"; adminPromptSelect.appendChild(p); }
          options.forEach((o) => { const el = document.createElement("option"); el.value = o; el.textContent = o; if (o === suggested) el.selected = true; adminPromptSelect.appendChild(el); });
          if (suggested && !options.includes(suggested)) { const el = document.createElement("option"); el.value = suggested; el.textContent = suggested; el.selected = true; adminPromptSelect.appendChild(el); }
        } else { adminPromptText.value = suggested; }
        setHidden(adminPromptSelectWrap, !isSelect);
        setHidden(adminPromptTextWrap, isSelect);
      }
      async function submitAdminPrompt(action) {
        const item = adminPromptState.item;
        if (!item || adminPromptState.isSubmitting) return;
        let value;
        if (action === "manual") {
          value = item.fieldType === "select" ? text(adminPromptSelect.value) : text(adminPromptText.value);
          if (!value) { setStatus(adminPromptStatus, "Informe uma resposta antes de enviar.", true); return; }
        }
        adminPromptState.isSubmitting = true; syncAdminPromptButtons(); setStatus(adminPromptStatus, "Enviando resposta…");
        try {
          await request("POST", "/api/admin/prompts/respond", { id: item.id, action, value });
          renderAdminPrompt(null);
        } catch (e) { setStatus(adminPromptStatus, e.message, true); }
        finally { adminPromptState.isSubmitting = false; syncAdminPromptButtons(); }
      }

      // ── API calls ──
      async function refreshProcesses() {
        try {
          const data = await request("GET", "/api/admin/processes");
          renderProcessState(data);
        } catch (e) { processRunning.innerHTML = `<span class="danger">${escapeHtml(e.message)}</span>`; }
      }
      async function refreshRuntime() {
        if (runtimeState.isPaused) { renderRuntime(); return; }
        try {
          const data = await request("GET", "/api/admin/runtime?logsLimit=200&stepsLimit=24");
          runtimeState.activeStep = data.activeStep || null;
          runtimeState.steps = Array.isArray(data.steps) ? data.steps : [];
          runtimeState.logs = Array.isArray(data.logs) ? data.logs : [];
          renderRuntime();
        } catch (e) { runtimeLogMeta.textContent = `Falha: ${e.message}`; }
      }
      async function refreshAdminPrompt() {
        try {
          const data = await request("GET", "/api/admin/prompts/current");
          if (!adminPromptSettings.isSaving) renderPromptSettings(data.settings || {});
          const item = data.item || null;
          const curId = adminPromptState.item ? adminPromptState.item.id : "";
          if (curId !== (item ? item.id : "")) renderAdminPrompt(item);
        } catch (e) { if (adminPromptState.item) setStatus(adminPromptStatus, e.message, true); }
      }

      // ── SSE Stream ──
      function applyAdminSnapshot(data) {
        const rt = data?.runtime || {};
        runtimeState.activeStep = rt.activeStep || null;
        runtimeState.steps = Array.isArray(rt.steps) ? rt.steps : [];
        runtimeState.logs = Array.isArray(rt.logs) ? rt.logs : [];
        renderRuntime();
        const prompt = data?.prompt || {};
        if (!adminPromptSettings.isSaving) renderPromptSettings(prompt.settings || {});
        const item = prompt.item || null;
        const curId = adminPromptState.item ? adminPromptState.item.id : "";
        if (curId !== (item ? item.id : "")) renderAdminPrompt(item);
      }
      function disconnectAdminStream() {
        if (adminStreamState.eventSource) { adminStreamState.eventSource.close(); adminStreamState.eventSource = null; }
        if (adminStreamState.reconnectTimer) { clearTimeout(adminStreamState.reconnectTimer); adminStreamState.reconnectTimer = null; }
        adminStreamState.connected = false;
      }
      function connectAdminStream() {
        if (!window.EventSource) return;
        disconnectAdminStream();
        const stream = new EventSource("/api/admin/stream");
        adminStreamState.eventSource = stream;
        stream.addEventListener("open", () => { adminStreamState.connected = true; renderRuntime(); });
        stream.addEventListener("snapshot", (e) => {
          adminStreamState.connected = true;
          try { applyAdminSnapshot(JSON.parse(e.data || "{}")); } catch {}
        });
        stream.addEventListener("error", () => {
          adminStreamState.connected = false; renderRuntime();
          if (adminStreamState.eventSource === stream) { stream.close(); adminStreamState.eventSource = null; }
          if (!adminStreamState.reconnectTimer) {
            adminStreamState.reconnectTimer = setTimeout(() => { adminStreamState.reconnectTimer = null; connectAdminStream(); }, 2000);
          }
        });
      }

      // ── Event listeners ──
      adminPromptConfirm.addEventListener("click", () => submitAdminPrompt("confirm"));
      adminPromptSubmit.addEventListener("click", () => submitAdminPrompt("manual"));
      adminPromptSkip.addEventListener("click", () => submitAdminPrompt("skip"));
      adminPromptCancel.addEventListener("click", () => submitAdminPrompt("cancel"));

      runtimeLogFilter.addEventListener("input", (e) => { runtimeState.filterText = e.currentTarget.value || ""; renderRuntime(); });
      runtimeLogLevel.addEventListener("change", (e) => { runtimeState.level = e.currentTarget.value || "all"; renderRuntime(); });
      runtimeLogSource.addEventListener("change", (e) => { runtimeState.source = e.currentTarget.value || "all"; renderRuntime(); });
      runtimePauseButton.addEventListener("click", () => { runtimeState.isPaused = !runtimeState.isPaused; renderRuntime(); if (!runtimeState.isPaused) refreshRuntime(); });
      runtimeClearButton.addEventListener("click", async () => {
        try {
          await request("POST", "/api/admin/runtime/clear", {});
          runtimeState.activeStep = null; runtimeState.steps = []; runtimeState.logs = []; renderRuntime();
        } catch (e) { runtimeLogMeta.textContent = `Falha ao limpar: ${e.message}`; }
      });

      // ── Init ──
      refreshProcesses();
      refreshRuntime();
      refreshAdminPrompt();
      connectAdminStream();

      setInterval(refreshProcesses, 3000);
      setInterval(refreshRuntime, 15000);
      setInterval(refreshAdminPrompt, 15000);
    </script>
    <script src="/admin/saas-dashboard.js"></script>
  </body>
</html>
