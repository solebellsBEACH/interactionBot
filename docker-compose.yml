version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: linkedinpack-mongo
    restart: unless-stopped

    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: interactionbot

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  mongo-express:
    image: mongo-express:1
    container_name: linkedinpack-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

    ports:
      - "8081:8081"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: linkedinpack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  postgres:
    image: postgres:16-alpine
    container_name: linkedinpack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: interactionbot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: botpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  mongo-data:
  postgres-data:
